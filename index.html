<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>KitKat – Avis Clients</title>
  </head>
  <body>
    <div class="card">
      <div class="step">
        <header class="card-header">
          <img
            src="Image/Logo_of_the_KitKat.svg 2.png"
            alt="KitKat"
            class="logo"
          />
          <h1 class="header-title">Avis Clients</h1>
        </header>

        <form action="#" method="post" class="step-content">
          <h2 class="section-title">Votre avis</h2>

          <div class="field">
            <label class="field-label">Sélectionné le produit *</label>
            <select name="produit" class="input-field">
              <option value="">— Choisir —</option>
              <option value="KitKat Original">KitKat Original</option>
              <option value="KitKat Chunky">KitKat Chunky</option>
              <option value="KitKat White">KitKat White</option>
              <option value="KitKat Bar">KitKat Bar</option>
            </select>
          </div>

          <div class="field">
            <label class="field-label">Note du produit *</label>
            <div class="radio-group">
              <label class="radio-label"
                ><input type="radio" name="note" value="1" /> 1 ★</label
              >
              <label class="radio-label"
                ><input type="radio" name="note" value="2" /> 2 ★</label
              >
              <label class="radio-label"
                ><input type="radio" name="note" value="3" /> 3 ★</label
              >
              <label class="radio-label"
                ><input type="radio" name="note" value="4" /> 4 ★</label
              >
              <label class="radio-label"
                ><input type="radio" name="note" value="5" /> 5 ★</label
              >
            </div>
          </div>

          <div class="field">
            <label class="field-label">Commentaires</label>
            <textarea
              name="commentaire"
              class="input-field textarea"
              placeholder="Écrire votre avis ici..."
              rows="3"
            ></textarea>
          </div>

          <div class="field">
            <label class="field-label">Ajouter une image</label>
            <label class="upload-box" for="photo">
              <img
                src="Image/UploadSimple.png"
                alt="Upload"
                class="upload-icon"
              />
              <span class="upload-text">Ajouter une image</span>
              <input type="file" id="photo" name="photo" accept="image/*" />
            </label>
          </div>

          <h2 class="section-title">Informations personnelles</h2>

          <div class="field">
            <label class="field-label">Nom, Prénom *</label>
            <input
              type="text"
              name="nom"
              class="input-field"
              placeholder="Votre nom et prénom"
            />
          </div>

          <div class="field">
            <label class="field-label">Adresse e-mail *</label>
            <input
              type="email"
              name="email"
              class="input-field"
              placeholder="Votre adresse e-mail"
            />
          </div>

          <div class="field">
            <label class="field-label">Votre tranche d'âge *</label>
            <div class="radio-group">
              <label class="radio-label"
                ><input type="radio" name="age" value="13-17" /> 13-17</label
              >
              <label class="radio-label"
                ><input type="radio" name="age" value="18-25" /> 18-25</label
              >
              <label class="radio-label"
                ><input type="radio" name="age" value="26-35" /> 26-35</label
              >
              <label class="radio-label"
                ><input type="radio" name="age" value="36-50" /> 36-50</label
              >
              <label class="radio-label"
                ><input type="radio" name="age" value="50+" /> 50 +</label
              >
            </div>
          </div>

          <button type="submit" class="submit-btn">Envoyer</button>
        </form>

        <img src="Image/Vecteur Gauche.png" class="blob blob-left" alt="" />
        <img src="Image/Vecteur 3.png" class="blob blob-right" alt="" />
      </div>
    </div>
  </body>
</html>
