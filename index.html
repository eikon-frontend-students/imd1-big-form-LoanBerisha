<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>KitKat – Avis Clients</title>
  </head>
  <body>
    <div class="card">
      <div class="step" id="step-1">
        <header class="card-header">
          <img
            src="Image/Logo_of_the_KitKat.svg 2.png"
            alt="KitKat"
            class="logo"
          />
          <h1 class="header-title">Avis Clients</h1>
        </header>

        <div class="progress-bar">
          <div class="dot active"></div>
          <div class="line"></div>
          <div class="dot"></div>
          <div class="line"></div>
          <div class="dot"></div>
        </div>

        <div class="step-content">
          <h2 class="section-title">Votre avis</h2>

          <div class="field">
            <label class="field-label">Sélectionné le produit *</label>
            <select id="produit" class="input-field">
              <option value="">— Choisir —</option>
              <option value="KitKat Original">KitKat Original</option>
              <option value="KitKat Chunky">KitKat Chunky</option>
              <option value="KitKat White">KitKat White</option>
              <option value="KitKat Bar">KitKat Bar</option>
            </select>
          </div>

          <div class="field">
            <label class="field-label">Note du produit *</label>
            <div class="stars" id="stars">
              <span class="star" data-val="1">★</span>
              <span class="star" data-val="2">★</span>
              <span class="star" data-val="3">★</span>
              <span class="star" data-val="4">★</span>
              <span class="star" data-val="5">★</span>
            </div>
          </div>

          <div class="field">
            <label class="field-label">Commentaires</label>
            <textarea
              id="commentaire"
              class="input-field textarea"
              placeholder="Écrire votre avis ici..."
              rows="3"
            ></textarea>
          </div>

          <div class="field">
            <p class="field-label">Ajouter une image</p>
            <label class="upload-box" for="photo">
              <img
                src="Image/UploadSimple.png"
                alt="Upload"
                class="upload-icon"
              />
              <span class="upload-text">Ajouter une image</span>
              <input type="file" id="photo" accept="image/*" hidden />
            </label>
            <span class="file-name" id="file-name"></span>
          </div>
        </div>

        <div class="nav-row">
          <div class="nav-spacer"></div>
          <button class="nav-btn" onclick="goNext(1)">
            <img src="Image/ArrowRight.png" alt="Suivant" />
          </button>
        </div>

        <img src="Image/Vecteur Gauche.png" class="blob blob-left" alt="" />
        <img src="Image/Vecteur 3.png" class="blob blob-right" alt="" />
      </div>

      <!-- ── ÉTAPE 2 : Informations personnelles ── -->
      <div class="step hidden" id="step-2">
        <header class="card-header">
          <img
            src="Image/Logo_of_the_KitKat.svg 2.png"
            alt="KitKat"
            class="logo"
          />
          <h1 class="header-title">Avis Clients</h1>
        </header>

        <div class="progress-bar">
          <div class="dot active"></div>
          <div class="line active"></div>
          <div class="dot active"></div>
          <div class="line"></div>
          <div class="dot"></div>
        </div>

        <div class="step-content">
          <h2 class="section-title">Informations personnelles</h2>

          <div class="field">
            <label class="field-label">Nom, Prénom *</label>
            <input
              type="text"
              id="nom"
              class="input-field"
              placeholder="Votre nom et prénom"
            />
          </div>

          <div class="field">
            <label class="field-label">Adresse e-mail *</label>
            <input
              type="email"
              id="email"
              class="input-field"
              placeholder="Votre adresse e-mail"
            />
          </div>

          <div class="field">
            <label class="field-label">Votre tranche d'âge *</label>
            <div class="radio-group">
              <label class="radio-label"
                ><input type="radio" name="age" value="13-17" /> 13-17</label
              >
              <label class="radio-label"
                ><input type="radio" name="age" value="18-25" /> 18-25</label
              >
              <label class="radio-label"
                ><input type="radio" name="age" value="26-35" /> 26-35</label
              >
              <label class="radio-label"
                ><input type="radio" name="age" value="36-50" /> 36-50</label
              >
              <label class="radio-label"
                ><input type="radio" name="age" value="50+" /> 50 +</label
              >
            </div>
          </div>
        </div>

        <div class="nav-row">
          <button class="nav-btn" onclick="goPrev(2)">
            <img src="Image/Arrowleft.png" alt="Précédent" />
          </button>
          <button class="nav-btn" onclick="goNext(2)">
            <img src="Image/ArrowRight.png" alt="Suivant" />
          </button>
        </div>

        <img src="Image/Vecteur Gauche.png" class="blob blob-left" alt="" />
        <img src="Image/Vecteur 3.png" class="blob blob-right" alt="" />
      </div>

      <!-- ── ÉTAPE 3 : Récapitulatif ── -->
      <div class="step hidden" id="step-3">
        <header class="card-header">
          <img
            src="Image/Logo_of_the_KitKat.svg 2.png"
            alt="KitKat"
            class="logo"
          />
          <h1 class="header-title">Avis Clients</h1>
        </header>

        <div class="progress-bar">
          <div class="dot active"></div>
          <div class="line active"></div>
          <div class="dot active"></div>
          <div class="line active"></div>
          <div class="dot active"></div>
        </div>

        <div class="step-content">
          <h2 class="section-title">Récapitulatif</h2>

          <div class="recap-item" id="recap-nom"></div>
          <div class="recap-item" id="recap-email"></div>
          <div class="recap-item" id="recap-age"></div>
          <div class="recap-item" id="recap-produit"></div>
          <div class="recap-item" id="recap-note"></div>
          <div class="recap-item" id="recap-commentaire"></div>

          <button class="submit-btn" onclick="submitForm()">envoyer</button>
        </div>

        <div class="nav-row">
          <button class="nav-btn" onclick="goPrev(3)">
            <img src="Image/Arrowleft.png" alt="Précédent" />
          </button>
          <div class="nav-spacer"></div>
        </div>

        <img src="Image/Vecteur Gauche.png" class="blob blob-left" alt="" />
        <img src="Image/Vecteur 3.png" class="blob blob-right" alt="" />
      </div>

      <!-- ── ÉTAPE 4 : Merci ── -->
      <div class="step hidden" id="step-4">
        <header class="card-header">
          <img
            src="Image/Logo_of_the_KitKat.svg 2.png"
            alt="KitKat"
            class="logo"
          />
          <h1 class="header-title">Avis Clients</h1>
        </header>

        <div class="thank-you-content">
          <div class="merci-wrap">
            <span class="merci-line merci-pour">MERCI POUR</span>
            <img
              src="Image/KitKat-label-Nestle-chocolate-bar-transparent-PNG-image-768x768-removebg-preview 1.png"
              alt="KitKat"
              class="kitkat-candy"
            />
            <span class="merci-line votre-avis">VOTRE AVIS</span>
          </div>
          <button class="cta-btn">call to action</button>
        </div>

        <img src="Image/Vecteur Gauche.png" class="blob blob-left" alt="" />
        <img src="Image/Vecteur 3.png" class="blob blob-right" alt="" />
      </div>
    </div>
    <!-- .card -->

    <script>
      let rating = 0;

      document.querySelectorAll(".star").forEach((star) => {
        star.addEventListener("click", () => {
          rating = parseInt(star.dataset.val);
          document.querySelectorAll(".star").forEach((s, i) => {
            s.classList.toggle("active", i < rating);
          });
        });
        star.addEventListener("mouseover", () => {
          const hovered = parseInt(star.dataset.val);
          document.querySelectorAll(".star").forEach((s, i) => {
            s.classList.toggle("hovered", i < hovered);
          });
        });
        star.addEventListener("mouseout", () => {
          document
            .querySelectorAll(".star")
            .forEach((s) => s.classList.remove("hovered"));
        });
      });

      document.getElementById("photo").addEventListener("change", (e) => {
        const file = e.target.files[0];
        document.getElementById("file-name").textContent = file
          ? file.name
          : "";
      });

      function goNext(step) {
        if (step === 2) fillRecap();
        document.getElementById("step-" + step).classList.add("hidden");
        document
          .getElementById("step-" + (step + 1))
          .classList.remove("hidden");
      }

      function goPrev(step) {
        document.getElementById("step-" + step).classList.add("hidden");
        document
          .getElementById("step-" + (step - 1))
          .classList.remove("hidden");
      }

      function fillRecap() {
        const stars = "★".repeat(rating) + "☆".repeat(5 - rating);
        const age = document.querySelector('input[name="age"]:checked');
        const comm = document.getElementById("commentaire").value;

        set(
          "recap-nom",
          "Nom, Prénom",
          document.getElementById("nom").value || "—",
        );
        set(
          "recap-email",
          "E-mail",
          document.getElementById("email").value || "—",
        );
        set("recap-age", "Âge", age ? age.value + " ans" : "—");
        set(
          "recap-produit",
          "Produit",
          document.getElementById("produit").value || "—",
        );
        set("recap-note", "Note", `<span class="recap-stars">${stars}</span>`);
        set(
          "recap-commentaire",
          "Commentaire",
          comm ? (comm.length > 28 ? comm.slice(0, 28) + "…" : comm) : "—",
        );
      }

      function set(id, label, value) {
        document.getElementById(id).innerHTML =
          `<span class="recap-key">${label} :</span><span class="recap-val">${value}</span>`;
      }

      function submitForm() {
        document.getElementById("step-3").classList.add("hidden");
        document.getElementById("step-4").classList.remove("hidden");
      }
    </script>
  </body>
</html>
